version: '3.8'

services:
  gymfuel-mongo:
    image: mongo:7.0
    container_name: gymfuel-mongo-staging
    volumes:
      - mongo-staging-data:/data/db
    restart: always

  gymfuel-redis:
    image: redis:7-alpine
    container_name: gymfuel-redis-staging
    restart: always

  gymfuel-api:
    image: ghcr.io/sibiraj-104/gymfuel-api:latest
    container_name: gymfuel-api-staging
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://gymfuel-mongo:27017/gymfuel
      - REDIS_URI=redis://gymfuel-redis:6379
      - NODE_ENV=production
      - STAGING=true
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
    depends_on:
      - gymfuel-mongo
      - gymfuel-redis
    restart: always

  gymfuel-user:
    image: ghcr.io/sibiraj-104/gymfuel-user:latest
    container_name: gymfuel-user-staging
    restart: always

  gymfuel-admin:
    image: ghcr.io/sibiraj-104/gymfuel-admin:latest
    container_name: gymfuel-admin-staging
    restart: always

  gymfuel-landing:
    image: ghcr.io/sibiraj-104/gymfuel-landing:latest
    container_name: gymfuel-landing-staging
    restart: always

  gymfuel-nginx:
    image: nginx:alpine
    container_name: gymfuel-nginx-staging
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - gymfuel-landing
      - gymfuel-user
      - gymfuel-admin
      - gymfuel-api
    restart: always

volumes:
  mongo-staging-data:
