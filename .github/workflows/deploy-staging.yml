name: CD Deploy Staging

on:
  push:
    branches: [main]

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: ghcr.io/sibiraj-104/gymfuel-api:latest

      - name: Build and Push User App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/user.Dockerfile
          push: true
          tags: ghcr.io/sibiraj-104/gymfuel-user:latest

      - name: Build and Push Admin Panel
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/admin.Dockerfile
          push: true
          tags: ghcr.io/sibiraj-104/gymfuel-admin:latest

      - name: Build and Push Landing Page
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/landing.Dockerfile
          push: true
          tags: ghcr.io/sibiraj-104/gymfuel-landing:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /app/gymfuel
            cd /app/gymfuel
            # Download/Sync staging compose configurations
            curl -fsSL https://raw.githubusercontent.com/sibiraj-104/gym_project/main/docker-compose.staging.yml -o docker-compose.staging.yml
            # Authenticate with GHCR on VPS
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u sibiraj-104 --password-stdin
            # Pull new images and restart containers
            docker compose -f docker-compose.staging.yml pull
            docker compose -f docker-compose.staging.yml up -d --remove-orphans
