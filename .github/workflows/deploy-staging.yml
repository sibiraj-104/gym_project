name: CD Deploy Staging

on:
  push:
    branches: [main]

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend API
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: ghcr.io/sibiraj-104/gymfuel-api:latest

      - name: Build and Push User App
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/user.Dockerfile
          push: true
          tags: ghcr.io/sibiraj-104/gymfuel-user:latest

      - name: Build and Push Admin Panel
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/admin.Dockerfile
          push: true
          tags: ghcr.io/sibiraj-104/gymfuel-admin:latest

      - name: Build and Push Landing Page
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/landing.Dockerfile
          push: true
          tags: ghcr.io/sibiraj-104/gymfuel-landing:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: JWT_SECRET,ADMIN_JWT_SECRET
          script: |
            sudo rm -rf ~/gymfuel/nginx
            mkdir -p ~/gymfuel/nginx
            cd ~/gymfuel
            # Write secrets to .env file for docker compose
            printf 'JWT_SECRET=%s\nADMIN_JWT_SECRET=%s\n' "$JWT_SECRET" "$ADMIN_JWT_SECRET" > .env
            # Download/Sync staging compose configurations using exact commit SHA to bypass cache
            curl -fsSL https://raw.githubusercontent.com/sibiraj-104/gym_project/${{ github.sha }}/docker-compose.staging.yml -o docker-compose.staging.yml
            curl -fsSL https://raw.githubusercontent.com/sibiraj-104/gym_project/${{ github.sha }}/nginx/staging.conf -o nginx/staging.conf
            # Authenticate with GHCR using temporary action token
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Pull new images and restart containers
            sudo docker compose -f docker-compose.staging.yml pull
            sudo docker compose -f docker-compose.staging.yml up -d --remove-orphans

  verify-deploy:
    name: Verify Staging Health Check
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for containers to stabilize
        run: sleep 15

      - name: Health check — staging API
        run: |
          curl --fail --retry 5 --retry-delay 5 --retry-connrefused \
            https://staging-api.rkvnova.com/api/system/health
