# ============================================================
# GymFuel — Nginx Staging Configuration
# ============================================================

# HTTP -> HTTPS Redirect
server {
    listen 80;
    server_name staging.gymfuel.com staging-app.gymfuel.com staging-admin.gymfuel.com staging-api.gymfuel.com;
    return 301 https://$host$request_uri;
}

# 1. Landing Page (staging.gymfuel.com)
server {
    listen 443 ssl;
    server_name staging.gymfuel.com;

    ssl_certificate /etc/letsencrypt/live/staging.gymfuel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.gymfuel.com/privkey.pem;

    location / {
        proxy_pass http://gymfuel-landing:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 2. User App (staging-app.gymfuel.com)
server {
    listen 443 ssl;
    server_name staging-app.gymfuel.com;

    ssl_certificate /etc/letsencrypt/live/staging-app.gymfuel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-app.gymfuel.com/privkey.pem;

    location / {
        proxy_pass http://gymfuel-user:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 3. Admin Panel (staging-admin.gymfuel.com)
server {
    listen 443 ssl;
    server_name staging-admin.gymfuel.com;

    ssl_certificate /etc/letsencrypt/live/staging-admin.gymfuel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-admin.gymfuel.com/privkey.pem;

    location / {
        proxy_pass http://gymfuel-admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 4. Backend API (staging-api.gymfuel.com)
server {
    listen 443 ssl;
    server_name staging-api.gymfuel.com;

    ssl_certificate /etc/letsencrypt/live/staging-api.gymfuel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-api.gymfuel.com/privkey.pem;

    location / {
        proxy_pass http://gymfuel-api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (for socket.io updates in admin/reports)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
